<div class="dashboard-home">

  <!-- HEADER -->
  <div class="header">
    <h1>Dashboard</h1>
    <p *ngIf="user">Bienvenue, {{ user.name }} </p>
  </div>

  <!-- STATS -->
  <div class="stats">

    <div class="card">
      <div class="container">

      </div>

      <div class="card-header">
        <span>Activités<br></span>
        <span>March 13</span>
      </div>

      <span class="temp">{{ stats.activities}}</span>

    </div>
    <!-- From Uiverse.io  -->
    <div class="card">
      <div class="container">

      </div>

      <div class="card-header">
        <span>Utilisateur<br></span>
        <span>March 13</span>
      </div>

      <span class="temp">{{ stats.users || 0}}</span>

    </div>


    <div class="card">
      <div class="container">
      </div>
      <div class="card-header">
        <span>Villes<br></span>
        <span>March 13</span>
      </div>
      <span class="temp">{{ stats.cities}}</span>
    </div>
    <div class="card">
      <div class="container">
      </div>
      <div class="card-header">
        <span>Plan generes<br></span>
        <span>March 13</span>
      </div>
      <span class="temp">{{ stats.plans}}</span>
    </div>
  </div>
</div>
