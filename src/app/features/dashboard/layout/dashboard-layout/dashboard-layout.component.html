<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Admin Panel</h2>

    <nav>
      <a routerLink="/dashboard">Dashboard</a>
      <a routerLink="/activities">Activities</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main">

    <!-- TOPBAR -->
    <header class="topbar">
      <div class="left">
        <span *ngIf="user">
          {{ user.name }}
        </span>
      </div>
      <div class="right">


        <button (click)="logout()">Logout</button>
      </div>

    </header>

    <!-- CONTENT -->
    <section class="content">
      <router-outlet></router-outlet>
    </section>

  </div>

</div>
