<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="logo">
      <h2>Travel Admin</h2>
    </div>

    <nav class="menu">

      <!-- PARENT -->
      <div
        class="menu-parent"
        (click)="toggleMenu()">
        Dashboard
        <span>{{ menuOpen ? '▼' : '▶' }}</span>
      </div>

      <!-- CHILDREN -->
      <div
        class="submenu"
        *ngIf="menuOpen">

        <a
          routerLink="/dashboard"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          Vue générale
        </a>

        <a
          routerLink="/dashboard/activities"
          routerLinkActive="active">
          Activités
        </a>

        <a
          routerLink="/dashboard/city"
          routerLinkActive="active">
          Villes
        </a>

        <a
          routerLink="/dashboard/hotel"
          routerLinkActive="active">
          Hôtels
        </a>

        <a
          routerLink="/dashboard/restaurant"
          routerLinkActive="active">
          Restaurants
        </a>

        <a
          routerLink="/dashboard/transport"
          routerLinkActive="active">
          Transports
        </a>
        <a
        routerLink="/dashboard/generate"
        routerLinkActive="active"
      >
        Generate
      </a>
      <a
        routerLink="/dashboard/algo-config"
        routerLinkActive="active"
      >
        Algo
      </a>
      </div>



    </nav>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <header class="topbar">
      <div>Bienvenue Admin</div>
    </header>

    <section class="content">
      <router-outlet></router-outlet>
    </section>

  </main>

</div>
